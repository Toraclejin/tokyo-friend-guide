<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' https://unpkg.com; style-src 'unsafe-inline' https://unpkg.com; img-src data: https://*.basemaps.cartocdn.com; base-uri 'none'; form-action 'none';" />
<meta name="theme-color" content="#1a1b4b" />
<title>도쿄 친구 가이드</title>
<meta name="description" content="우에노 호텔 기준 도쿄 자유여행 가이드 — 구역별 관광지·맛집·카페, 탭하면 구글맵." />
<!-- 접속 비번 게이트 — FOUC 방지. 토큰 없으면 즉시 .auth-locked 부착 → 본문 가림. 평문 비번 박제 X (SHA-256 해시만). -->
<script>
  (function () {
    try {
      if (localStorage.getItem('tokyo-guide-auth-v2') !== 'ok') {
        document.documentElement.classList.add('auth-locked');
      }
    } catch (e) {
      document.documentElement.classList.add('auth-locked');
    }
  })();
</script>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231a1b4b'/%3E%3Ccircle cx='48' cy='16' r='6' fill='%23d94848'/%3E%3Ctext x='32' y='45' text-anchor='middle' font-family='Helvetica,Arial,sans-serif' font-size='34' font-weight='900' fill='%23f5f3ee' letter-spacing='-1'%3ET%3C/text%3E%3C/svg%3E" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  /* =====================================================
     도쿄 친구 가이드 — 단일 파일 · 외부 의존성 0 · 시스템 폰트
     ===================================================== */
  :root {
    --frame:      #1a1b4b;
    --page:       #f5f3ee;
    --page-tint:  #ebe7df;
    --page-warm:  #efece4;
    --white:      #ffffff;
    --ink:        #2a2d3a;
    --ink-soft:   #5a5d6a;
    --ink-faint:  #8a8d99;
    --indigo:     #1a1b4b;
    --indigo-light:#4a4d8b;
    --tokyo-red:  #d94848;
    --gold:       #d4af37;
    --gold-dark:  #a08828;
    --gold-glow:  rgba(212,175,55,.4);
    --essential:      #C0455E;
    --essential-dark: #97324a;
    --essential-glow: rgba(192,69,94,.26);
    --line:       #d9d6cf;
    --line-faint: #e7e4dd;
    --shadow:     rgba(26,27,75,.10);

    --cat-sight:  #4A55A3;
    --cat-meal:   #D67025;
    --cat-cafe:   #8B6F47;

    --r:          12px;
    --pad-x:      clamp(18px, 5vw, 56px);

    --sans: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard",
            "Malgun Gothic", "Noto Sans KR", "Segoe UI", Roboto, system-ui, sans-serif;
    --serif: Georgia, "Times New Roman", "Apple SD Gothic Neo", serif;
  }

  /* ===== 접속 비번 게이트 ===== */
  html.auth-locked body > *:not(.auth-gate) { visibility: hidden !important; }
  html.auth-locked body { overflow: hidden !important; }
  html:not(.auth-locked) .auth-gate { display: none !important; }
  .auth-gate {
    position: fixed; inset: 0; z-index: 99999;
    background:
      radial-gradient(130% 55% at 50% -8%, rgba(74,77,139,.35), transparent 62%),
      var(--frame);
    display: flex; align-items: center; justify-content: center;
    padding: 24px; overflow: auto;
  }
  .auth-card {
    width: min(420px, 92vw); background: var(--page); border-radius: var(--r);
    padding: 36px 32px 28px; box-shadow: 0 24px 64px rgba(0,0,0,.35);
    text-align: center; color: var(--ink);
  }
  .auth-eyebrow {
    font-family: var(--sans); font-weight: 700; font-size: 10px;
    letter-spacing: .32em; text-transform: uppercase; color: var(--tokyo-red); margin-bottom: 14px;
  }
  .auth-title {
    font-family: var(--sans); font-weight: 800; font-size: clamp(34px, 9vw, 50px);
    line-height: 1.02; letter-spacing: -.02em; color: var(--indigo); margin: 0 0 10px;
  }
  .auth-title .red { color: var(--tokyo-red); }
  .auth-deck { font-family: var(--serif); font-style: italic; font-size: 13px; color: var(--ink-soft); margin: 0 0 24px; }
  .auth-q {
    display: inline-flex; align-items: baseline; gap: 8px; padding: 10px 16px;
    background: var(--page-warm); border-left: 2px solid var(--tokyo-red);
    border-radius: 0 6px 6px 0; margin-bottom: 18px;
  }
  .auth-q-mark { font-family: var(--sans); font-weight: 700; font-size: 11px; letter-spacing: .18em; color: var(--tokyo-red); }
  .auth-q-text { font-family: var(--serif); font-style: italic; font-size: 14.5px; color: var(--ink); }
  .auth-form { display: flex; gap: 8px; margin-bottom: 12px; }
  .auth-input {
    flex: 1; padding: 12px 16px; border: 1px solid var(--line); border-radius: 6px;
    background: #fff; font-family: var(--sans); font-size: 18px; letter-spacing: .4em;
    text-align: center; color: var(--ink); outline: none; transition: border-color .15s;
    -webkit-text-security: disc; text-security: disc;
  }
  .auth-input:focus { border-color: var(--tokyo-red); }
  .auth-input:disabled { opacity: .5; cursor: not-allowed; }
  .auth-submit {
    padding: 12px 18px; background: var(--indigo); color: var(--page); border: none; border-radius: 6px;
    font-family: var(--sans); font-weight: 600; font-size: 12px; letter-spacing: .18em;
    text-transform: uppercase; cursor: pointer; transition: background .15s; white-space: nowrap;
  }
  .auth-submit:hover:not(:disabled) { background: var(--tokyo-red); }
  .auth-submit:disabled { opacity: .5; cursor: not-allowed; }
  .auth-msg { font-family: var(--sans); font-size: 12.5px; color: var(--tokyo-red); min-height: 18px; margin-bottom: 8px; }
  .auth-msg.ok { color: #2e7d32; }
  .auth-note { font-family: var(--serif); font-style: italic; font-size: 11.5px; color: var(--ink-faint); }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
  body {
    background:
      radial-gradient(130% 55% at 50% -8%, rgba(74,77,139,.35), transparent 62%),
      var(--frame);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    word-break: keep-all;
    overflow-wrap: anywhere;
    -webkit-font-smoothing: antialiased;
    padding: clamp(0px, 3vw, 40px);
    min-height: 100vh;
  }

  .sheet {
    max-width: 1080px;
    margin: 0 auto;
    background: var(--page);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(13,14,46,.45);
    position: relative;
  }
  .sheet::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(90deg, var(--tokyo-red), var(--gold) 55%, var(--indigo-light));
    z-index: 2;
  }

  /* ===== Icons ===== */
  .ico { display: inline-flex; align-items: center; justify-content: center; }
  .ico svg { width: 1em; height: 1em; display: block; }

  /* ===== Masthead ===== */
  .masthead { padding: clamp(30px,7vw,60px) var(--pad-x) clamp(20px,4vw,30px); background: linear-gradient(180deg, var(--page-warm), var(--page)); }
  .kicker {
    font-size: 11.5px; font-weight: 700; letter-spacing: .34em; text-transform: uppercase;
    color: var(--tokyo-red); display: flex; align-items: center; gap: 9px; margin-bottom: 12px;
  }
  .kicker::before { content:''; width: 22px; height: 2px; background: var(--tokyo-red); }
  .mast-title { font-size: clamp(58px,17vw,150px); font-weight: 900; letter-spacing: -.045em; line-height: .82; color: var(--indigo); }
  .mast-title .dot { color: var(--tokyo-red); }
  .mast-sub { font-family: var(--serif); font-style: italic; font-size: clamp(19px,4.4vw,30px); color: var(--ink-soft); margin-top: 10px; }
  .mast-lede { margin-top: 16px; max-width: 56ch; font-size: 15px; color: var(--ink-soft); }

  .mast-meta { margin-top: 20px; display: flex; flex-wrap: wrap; gap: 9px; }
  .pill {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--page-tint); border: 1px solid var(--line); border-radius: 999px;
    padding: 7px 13px; font-size: 13px; color: var(--ink);
  }
  .pill .ico { color: var(--tokyo-red); font-size: 15px; }
  .pill b { font-weight: 700; }

  /* ===== Sticky nav ===== */
  .nav {
    position: sticky; top: 0; z-index: 30;
    background: rgba(245,243,238,.9);
    -webkit-backdrop-filter: saturate(180%) blur(10px);
    backdrop-filter: saturate(180%) blur(10px);
    border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
  }
  .nav-row { display: flex; align-items: center; gap: 8px; padding: 9px var(--pad-x); }
  .nav-row.zones { border-bottom: 1px dashed var(--line-faint); }
  .nav-row .scroller {
    display: flex; gap: 7px; overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; flex: 1; padding-bottom: 1px;
  }
  .nav-row .scroller::-webkit-scrollbar { display: none; }
  .nav-lbl { font-size: 10.5px; font-weight: 700; letter-spacing: .12em; color: var(--ink-faint); text-transform: uppercase; flex-shrink: 0; }

  .chip {
    flex-shrink: 0; cursor: pointer; white-space: nowrap;
    border: 1px solid var(--line); background: var(--white); color: var(--ink-soft);
    border-radius: 999px; padding: 6px 13px; font-size: 13px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 7px; line-height: 1;
    transition: background .15s, color .15s, border-color .15s; font-family: inherit;
  }
  .chip:hover { border-color: var(--indigo-light); color: var(--indigo); }
  .chip .cnt { font-size: 11px; color: var(--ink-faint); font-variant-numeric: tabular-nums; }
  .chip .swatch { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .zone-chip[aria-current="true"] { background: var(--zc, var(--indigo)); border-color: var(--zc, var(--indigo)); color: #fff; }
  .chip[aria-pressed="true"] { background: var(--indigo); border-color: var(--indigo); color: #fff; }
  .chip[aria-pressed="true"] .cnt { color: rgba(255,255,255,.72); }
  .chip.rec { gap: 6px; }
  .chip.rec .ico { font-size: 13px; color: var(--gold-dark); }
  .chip.rec[aria-pressed="true"] { background: var(--gold); border-color: var(--gold-dark); color: #3a2e05; }
  .chip.rec[aria-pressed="true"] .ico { color: #3a2e05; }
  .chip.rec[aria-pressed="true"] .cnt { color: rgba(58,46,5,.6); }
  .chip.ess { gap: 6px; }
  .chip.ess[aria-pressed="true"] { background: var(--essential); border-color: var(--essential-dark); color: #fff; }
  .chip.ess[aria-pressed="true"] .cnt { color: rgba(255,255,255,.72); }

  /* ===== Body ===== */
  .body { padding: clamp(18px,4vw,34px) var(--pad-x) clamp(40px,8vw,72px); }

  .zone { margin-top: clamp(30px,6vw,48px); scroll-margin-top: 104px; }
  .zone:first-child { margin-top: 6px; }
  .zone.hide { display: none; }

  .zone-head { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; padding-bottom: 11px; border-bottom: 2px solid var(--zc, var(--indigo)); }
  .zone-tag {
    display: inline-flex; align-items: center; gap: 7px; flex-shrink: 0;
    background: var(--zc); color: #fff; border-radius: 7px; padding: 5px 10px;
    font-size: 12px; font-weight: 800; letter-spacing: .04em;
  }
  .zone-name { font-family: var(--serif); font-weight: 700; font-size: clamp(27px,6vw,46px); line-height: 1; color: var(--indigo); letter-spacing: -.01em; }
  .zone-access { margin-left: auto; display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--ink-faint); }
  .zone-access .ico { color: var(--zc); font-size: 14px; }

  /* ===== Zone map link (탭하면 실제 구글맵으로 그 구역이 열림) ===== */
  .zone-map-link {
    margin-top: 13px; display: flex; align-items: center; gap: 12px;
    text-decoration: none; color: var(--ink);
    background: var(--page-warm); border: 1px solid var(--line); border-left: 4px solid var(--zc);
    border-radius: var(--r); padding: 12px 15px;
    transition: box-shadow .16s, transform .16s, border-color .16s;
    -webkit-tap-highlight-color: rgba(26,27,75,.06);
  }
  .zone-map-link:hover { box-shadow: 0 8px 20px var(--shadow); transform: translateY(-1px); }
  .zone-map-link:active { transform: translateY(0); box-shadow: 0 3px 10px var(--shadow); }
  .zml-icon { width: 38px; height: 38px; border-radius: 9px; flex-shrink: 0; background: var(--zc); color: #fff; display: flex; align-items: center; justify-content: center; }
  .zml-icon .ico { font-size: 20px; }
  .zml-text { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .zml-title { font-size: 14.5px; font-weight: 700; color: var(--ink); }
  .zml-sub { font-size: 12px; color: var(--ink-faint); margin-top: 1px; }
  .zml-arrow { flex-shrink: 0; font-size: 18px; color: var(--zc); transition: transform .15s; }
  .zone-map-link:hover .zml-arrow { transform: translateX(3px); }

  /* ===== Zone embedded map (실제 구글맵 iframe + 하단 전체화면 버튼) ===== */
  .zone-map { margin-top: 13px; border: 1px solid var(--line); border-left: 4px solid var(--zc); border-radius: var(--r); overflow: hidden; background: var(--page-warm); }
  .zone-map-canvas { width: 100%; height: clamp(210px, 48vw, 300px); background: var(--page-tint); z-index: 0; }
  .zone-map-canvas.leaflet-container { font: inherit; background: var(--page-tint); }
  .zone-map .zone-map-link { margin-top: 0; border: 0; border-top: 1px solid var(--line); border-radius: 0; background: #fff; }
  .zone-map .zone-map-link:hover { transform: none; box-shadow: none; background: var(--page-warm); }
  .zone-map .zone-map-link:active { transform: none; }
  .map-pop .mp-name { font-weight: 700; font-size: 14px; color: var(--ink); }
  .map-pop .mp-feat { font-size: 12px; color: var(--ink-soft); margin-top: 3px; line-height: 1.45; }
  .map-pop .mp-link { display: inline-block; margin-top: 7px; font-size: 12.5px; font-weight: 700; color: var(--indigo); text-decoration: none; }
  .map-pop .mp-link:hover { color: var(--tokyo-red); }
  /* 번호 핀 + 범례 — 지도에서 어느 점이 어디인지 바로 보이게 (todo 2026-06-21) */
  .zm-pin.leaflet-div-icon { background: transparent; border: 0; }
  .zm-pin-dot { display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; color: #fff; font-size: 11.5px; font-weight: 800; line-height: 1; border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.35); font-family: inherit; }
  .zm-pin.is-rec .zm-pin-dot { box-shadow: 0 0 0 2px rgba(212,175,55,.5), 0 1px 5px rgba(0,0,0,.4); }
  .zm-legend { display: flex; flex-wrap: wrap; gap: 6px; padding: 11px 12px; border-top: 1px solid var(--line); background: #fff; }
  .zm-leg-item { display: inline-flex; align-items: center; gap: 6px; max-width: 100%; border: 1px solid var(--line); border-radius: 999px; background: var(--page-warm); padding: 4px 11px 4px 4px; font: inherit; font-size: 12px; color: var(--ink); cursor: pointer; transition: border-color .15s, transform .05s; }
  .zm-leg-item:hover { border-color: var(--zc); }
  .zm-leg-item:active { transform: translateY(1px); }
  .zm-leg-num { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 50%; flex: 0 0 auto; color: #fff; font-size: 10.5px; font-weight: 800; line-height: 1; }
  .zm-leg-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .zm-leg-item.is-rec .zm-leg-name { font-weight: 700; }
  /* 이름↔핀 하이라이트 연동 */
  .zm-legend-hint { flex: 0 0 100%; font-size: 11px; color: var(--ink-soft); margin: 0 2px 2px; }
  .zm-pin .zm-pin-dot { transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease; }
  .zone-map-canvas.zm-focus .zm-pin .zm-pin-dot { opacity: .28; }
  .zone-map-canvas.zm-focus .zm-pin.zm-pin--active .zm-pin-dot,
  .zone-map-canvas .zm-pin.zm-pin--hover .zm-pin-dot { opacity: 1; }
  .zm-pin.zm-pin--hover .zm-pin-dot { transform: scale(1.28); box-shadow: 0 2px 9px rgba(0,0,0,.5); }
  .zm-pin.zm-pin--active .zm-pin-dot { transform: scale(1.5); box-shadow: 0 0 0 4px #fff, 0 0 0 6px var(--tokyo-red), 0 3px 11px rgba(0,0,0,.5); }
  .zm-leg-item.is-hover { border-color: var(--zc); }
  .zm-leg-item.is-active { border-color: var(--zc); background: var(--page-tint); box-shadow: inset 0 0 0 1.5px var(--zc); }
  .zm-leg-item.is-flash { animation: zmLegFlash 1.2s ease; }
  @keyframes zmLegFlash { 0%, 100% { box-shadow: none; } 25% { background: var(--page-tint); box-shadow: inset 0 0 0 1.5px var(--zc); } }
  .leaflet-popup-content { margin: 11px 13px; font-family: inherit; }

  /* Disney 호텔→디즈니랜드 길찾기 버튼 */
  .dir-btn { display: flex; align-items: center; gap: 12px; text-decoration: none; background: var(--zc); color: #fff; border-radius: var(--r); padding: 14px 16px; margin-bottom: 12px; box-shadow: 0 8px 22px rgba(168,51,106,.26); transition: transform .15s, box-shadow .15s; -webkit-tap-highlight-color: rgba(0,0,0,.1); }
  .dir-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(168,51,106,.34); }
  .dir-btn:active { transform: translateY(0); }
  .dir-ico { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .dir-ico .ico { font-size: 22px; }
  .dir-text { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .dir-t { font-size: 15px; font-weight: 800; }
  .dir-sub { font-size: 11.5px; opacity: .9; margin-top: 1px; }
  .dir-arrow { flex-shrink: 0; font-size: 20px; }

  /* ===== Category section ===== */
  .catsec { margin-top: clamp(18px,4vw,26px); }
  .catsec.hide { display: none; }
  .cat-head { display: flex; align-items: center; gap: 10px; margin-bottom: 13px; }
  .cat-badge { display: inline-flex; align-items: center; gap: 6px; color: #fff; border-radius: 7px; padding: 5px 11px 5px 9px; font-size: 11.5px; font-weight: 800; letter-spacing: .1em; }
  .cat-badge .ico { font-size: 14px; }
  .cat-ko { font-size: 14px; font-weight: 700; color: var(--ink); }
  .cat-line { flex: 1; height: 1px; background: var(--line-faint); }
  .cat-cnt { font-size: 12px; color: var(--ink-faint); font-variant-numeric: tabular-nums; }

  /* ===== Place cards ===== */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(255px,1fr)); gap: 11px; }
  .place {
    display: flex; flex-direction: column; text-decoration: none; color: inherit;
    background: #fff; border: 1px solid var(--line); border-left: 4px solid var(--accent);
    border-radius: var(--r); padding: 15px 16px 13px; position: relative;
    transition: box-shadow .16s, transform .16s, border-color .16s;
    -webkit-tap-highlight-color: rgba(26,27,75,.06);
  }
  .place:hover { box-shadow: 0 10px 24px var(--shadow); transform: translateY(-2px); }
  .place:active { transform: translateY(0); box-shadow: 0 4px 12px var(--shadow); }
  .place.hide { display: none; }
  .place.rec { background: linear-gradient(180deg,#fffdf4,#fff); }
  .place.essential { background: linear-gradient(180deg,#fff6f8,#fff); }
  .p-essential { flex-shrink: 0; display: inline-flex; align-items: center; gap: 3px; background: var(--essential); color: #fff; font-size: 10.5px; font-weight: 800; letter-spacing: .02em; border-radius: 999px; padding: 3px 9px; box-shadow: 0 0 0 3px var(--essential-glow); white-space: nowrap; }

  .p-top { display: flex; align-items: flex-start; gap: 9px; }
  .p-name { flex: 1; font-size: 16.5px; font-weight: 700; line-height: 1.3; color: var(--ink); }
  .p-star { flex-shrink: 0; display: inline-flex; align-items: center; gap: 3px; background: var(--gold); color: #3a2e05; font-size: 10.5px; font-weight: 800; letter-spacing: .04em; border-radius: 999px; padding: 3px 8px 3px 6px; box-shadow: 0 0 0 3px var(--gold-glow); white-space: nowrap; }
  .p-star .ico { font-size: 11px; }
  .p-en { font-size: 11.5px; font-weight: 500; letter-spacing: .04em; color: var(--ink-faint); margin-top: 3px; }
  .p-feat { font-size: 13.5px; color: var(--ink-soft); margin-top: 9px; flex: 1; }

/* ============================================================
   DOM helpers — 사용자 텍스트는 textContent, SVG는 정적 상수만 innerHTML
   ============================================================ */
function E(tag, cls, text) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text != null) n.textContent = text;
  return n;
}
function icon(markup, cls) {
  const s = document.createElement('span');
  s.className = 'ico' + (cls ? ' ' + cls : '');
  s.innerHTML = markup;          // markup = SVG 상수만 (사용자 데이터 아님)
  return s;
}
function zoneAccent(i) { return ZONE_ACCENTS[i % ZONE_ACCENTS.length]; }

function eachPlace(fn) { GUIDE_DATA.zones.forEach((z, zi) => z.sections.forEach(s => s.places.forEach(p => fn(p, s, z, zi)))); }
function count(pred) { let n = 0; eachPlace((p, s, z) => { if (pred(p, s, z)) n++; }); return n; }

/* ============================================================
   상태
   ============================================================ */
let activeCat = 'all';
let recOnly = false;
let essentialOnly = false;

/* ============================================================
   렌더 — 마스트헤드 / 내비 / 구역
   ============================================================ */
function renderMast() {
  document.getElementById('mast-sub').textContent = GUIDE_DATA.title;
  const meta = document.getElementById('mast-meta');
  const h = GUIDE_DATA.base_hotel;
  if (h) {
    const p = E('span', 'pill');
    p.appendChild(icon(SVG.hotel));
    const t = E('span');
    t.appendChild(E('b', null, h.name));
    if (h.note) t.appendChild(document.createTextNode(' · ' + h.note));
    p.appendChild(t);
    meta.appendChild(p);
  }
  const total = count(() => true);
  const p2 = E('span', 'pill');
  p2.appendChild(icon(SVG.grid));
  p2.appendChild(document.createTextNode(GUIDE_DATA.zones.length + '개 구역 · 총 ' + total + '곳'));
  meta.appendChild(p2);
  document.getElementById('foot-count').textContent = total + ' places · ' + GUIDE_DATA.zones.length + ' areas';
}

function renderNav() {
  // 구역 바로가기
  const zn = document.getElementById('zone-nav');
  GUIDE_DATA.zones.forEach((z, zi) => {
    const b = E('button', 'chip zone-chip');
    b.type = 'button';
    b.dataset.target = 'zone-' + z.id;
    b.style.setProperty('--zc', zoneAccent(zi));
    b.appendChild(E('span', null, String(z.id).padStart(2, '0') + ' ' + z.name));
    b.addEventListener('click', () => {
      const el = document.getElementById('zone-' + z.id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    zn.appendChild(b);
  });
  // 디즈니 특별 섹션 바로가기
  const dz = E('button', 'chip zone-chip');
  dz.type = 'button';
  dz.dataset.target = 'disney';
  dz.style.setProperty('--zc', DISNEY.accent);
  dz.appendChild(E('span', null, '★ 디즈니랜드'));
  dz.addEventListener('click', () => {
    const el = document.getElementById('disney');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
  zn.appendChild(dz);

  // 분류 필터
  const fn = document.getElementById('filter-nav');
  const cats = [{ key: 'all', label: '전체', color: null }];
  ['관광지', '맛집', '카페'].forEach(ko => { if (count((p, s) => s.category === ko) > 0) cats.push({ key: CAT[ko].key, label: ko, color: CAT[ko].color }); });
  cats.forEach(c => {
    const b = E('button', 'chip cat-filter');
    b.type = 'button';
    b.dataset.filter = c.key;
    b.setAttribute('aria-pressed', c.key === activeCat ? 'true' : 'false');
    if (c.color) { const sw = E('span', 'swatch'); sw.style.background = c.color; b.appendChild(sw); }
    b.appendChild(E('span', null, c.label));
    b.appendChild(E('span', 'cnt', String(count((p, s) => c.key === 'all' ? true : CAT[s.category].key === c.key))));
    b.addEventListener('click', () => { activeCat = c.key; syncFilters(); applyFilter(); });
    fn.appendChild(b);
  });
  const rec = E('button', 'chip rec');
  rec.type = 'button'; rec.id = 'rec-toggle';
  rec.setAttribute('aria-pressed', 'false');
  rec.appendChild(icon(SVG.star));
  rec.appendChild(E('span', null, '추천만'));
  rec.appendChild(E('span', 'cnt', String(count(p => p.recommended))));
  rec.addEventListener('click', () => { recOnly = !recOnly; syncFilters(); applyFilter(); });
  fn.appendChild(rec);

  const essN = count(p => p.essential);
  if (essN > 0) {
    const ess = E('button', 'chip ess');
    ess.type = 'button'; ess.id = 'ess-toggle';
    ess.setAttribute('aria-pressed', 'false');
    ess.appendChild(E('span', null, '🇰🇷 한국인 필수만'));
    ess.appendChild(E('span', 'cnt', String(essN)));
    ess.addEventListener('click', () => { essentialOnly = !essentialOnly; syncFilters(); applyFilter(); });
    fn.appendChild(ess);
  }
}

function syncFilters() {
  document.querySelectorAll('.cat-filter').forEach(b => b.setAttribute('aria-pressed', b.dataset.filter === activeCat ? 'true' : 'false'));
  const r = document.getElementById('rec-toggle');
  if (r) r.setAttribute('aria-pressed', recOnly ? 'true' : 'false');
  const e = document.getElementById('ess-toggle');
  if (e) e.setAttribute('aria-pressed', essentialOnly ? 'true' : 'false');
}

function buildCard(p, cat) {
  const a = document.createElement('a');
  a.className = 'place' + (p.recommended ? ' rec' : '') + (p.essential ? ' essential' : '');
  a.href = p.maps_url || '#';
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  a.style.setProperty('--accent', cat.color);
  a.dataset.cat = cat.key;
  a.dataset.rec = p.recommended ? '1' : '0';
  a.dataset.ess = p.essential ? '1' : '0';

  const top = E('div', 'p-top');
  top.appendChild(E('div', 'p-name', p.name_ko));
  // 한국인 필수 배지가 추천(★)보다 우선 — 카드당 배지 하나로 정리
  if (p.essential) {
    top.appendChild(E('span', 'p-essential', '🇰🇷 한국인 필수'));
  } else if (p.recommended) {
    const st = E('span', 'p-star');
    st.appendChild(icon(SVG.star));
    st.appendChild(E('span', null, '추천'));
    top.appendChild(st);
  }
  a.appendChild(top);
  if (p.name_en && p.name_en !== p.name_ko) a.appendChild(E('div', 'p-en', p.name_en));
  if (p.feature) a.appendChild(E('p', 'p-feat', p.feature));

  const go = E('div', 'p-go');
  go.appendChild(icon(SVG.pin));
  go.appendChild(E('span', null, '구글맵 열기'));
  go.appendChild(icon(SVG.arrow, 'arrow'));
  a.appendChild(go);
  return a;
}

/* 구역 중심 좌표 (장소들의 평균) — offzone(구역서 멀리 떨어진 장소)은 중심 계산에서 제외 */
function zoneCenter(zone) {
  let n = 0, la = 0, ln = 0;
  zone.sections.forEach(s => s.places.forEach(p => { if (!p.offzone && typeof p.lat === 'number' && typeof p.lng === 'number') { la += p.lat; ln += p.lng; n++; } }));
  return n ? { lat: la / n, lng: ln / n, n: n } : null;
}

/* "이 구역 구글맵에서 보기" 버튼 — 탭하면 그 동네가 실제 구글맵으로 열림(외부 임베드 X) */
function buildZoneMapLink(zone, accent) {
  const c = zoneCenter(zone);
  if (!c) return null;
  let total = 0, rec = 0;
  zone.sections.forEach(s => s.places.forEach(p => { total++; if (p.recommended) rec++; }));

  const a = document.createElement('a');
  a.className = 'zone-map-link';
  a.href = 'https://www.google.com/maps/@?api=1&map_action=map&center=' + c.lat.toFixed(6) + ',' + c.lng.toFixed(6) + '&zoom=14';
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  a.style.setProperty('--zc', accent);

  const ib = E('span', 'zml-icon');
  ib.appendChild(icon(SVG.map));
  a.appendChild(ib);

  const tx = E('span', 'zml-text');
  tx.appendChild(E('span', 'zml-title', '이 구역 구글맵에서 보기'));
  tx.appendChild(E('span', 'zml-sub', zone.name + ' · ' + total + '곳' + (rec ? ' · 추천 ' + rec : '')));
  a.appendChild(tx);

  a.appendChild(icon(SVG.arrow, 'zml-arrow'));
  return a;
}

/* 구역 지도 — Leaflet 인터랙티브 지도에 그 구역의 모든 장소를 핀으로 표시 + 하단 구글맵 버튼.
   ※ 구글맵은 API 키 없이는 임베드 차단(X-Frame-Options). 표시는 OSM 데이터 기반 지도,
     핀 탭 → 이름·설명 + '구글맵 열기', 하단 버튼 → 그 구역을 구글맵으로. */
const ZONE_MAP_REG = [];
function buildZoneMap(zone, accent) {
  if (!zoneCenter(zone)) return null;
  const wrap = E('div', 'zone-map');
  wrap.style.setProperty('--zc', accent);
  const canvas = E('div', 'zone-map-canvas');
  canvas.setAttribute('role', 'application');
  canvas.setAttribute('aria-label', zone.name + ' 지도 — 장소 핀');
  wrap.appendChild(canvas);
  wrap.appendChild(buildZoneMapLink(zone, accent));
  ZONE_MAP_REG.push({ el: canvas, zone: zone, accent: accent, map: null });
  return wrap;
}

function initLeafletMap(entry) {
  if (entry.el.dataset.init === '1' || !window.L) return;
  entry.el.dataset.init = '1';
  const map = L.map(entry.el, { scrollWheelZoom: false, dragging: !L.Browser.mobile, zoomControl: true, attributionControl: true });
  entry.map = map;
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd', maxZoom: 19, attribution: '© OpenStreetMap, © CARTO'
  }).addTo(map);

  const pts = [];
  const legendItems = [];
  let num = 0;
  entry.zone.sections.forEach(s => s.places.forEach(p => {
    if (typeof p.lat !== 'number' || typeof p.lng !== 'number') return;
    num++;
    const rec = !!p.recommended;
    const bg = rec ? '#d4af37' : entry.accent;
    const ic = L.divIcon({
      className: 'zm-pin' + (rec ? ' is-rec' : ''),
      html: '<span class="zm-pin-dot" style="background:' + bg + '">' + num + '</span>',
      iconSize: [24, 24], iconAnchor: [12, 12], popupAnchor: [0, -13]
    });
    const m = L.marker([p.lat, p.lng], { icon: ic, title: p.name_ko, riseOnHover: true }).addTo(map);
    const pop = E('div', 'map-pop');
    pop.appendChild(E('div', 'mp-name', num + '. ' + p.name_ko + (rec ? ' ★' : '')));
    if (p.feature) pop.appendChild(E('div', 'mp-feat', p.feature));
    if (p.maps_url) {
      const a = E('a', 'mp-link', '구글맵 열기 →');
      a.href = p.maps_url; a.target = '_blank'; a.rel = 'noopener noreferrer';
      pop.appendChild(a);
    }
    m.bindPopup(pop);
    legendItems.push({ num: num, name: p.name_ko, rec: rec, bg: bg, lat: p.lat, lng: p.lng, marker: m, btn: null });
    // offzone(구역서 멀리 떨어진 장소)은 fitBounds 프레이밍에서 제외 — 핀·범례·팝업은 그대로,
    // 지도 초기 줌만 구역 군집에 맞춤. 범례 칩 탭하면 그 핀으로 setView 됨.
    if (!p.offzone) pts.push([p.lat, p.lng]);
  }));

  // ===== 이름↔핀 하이라이트 연동 =====
  const canvas = entry.el;
  let activeIdx = -1;
  const markerEl = (it) => { try { return it.marker.getElement(); } catch (e) { return null; } };
  function setHover(idx, on) {
    const it = legendItems[idx]; if (!it) return;
    const el = markerEl(it); if (el) el.classList.toggle('zm-pin--hover', !!on);
    if (it.btn) it.btn.classList.toggle('is-hover', !!on);
  }
  function deactivate(it) {
    if (!it) return;
    const el = markerEl(it); if (el) el.classList.remove('zm-pin--active');
    try { it.marker.setZIndexOffset(0); } catch (e) {}
    if (it.btn) { it.btn.classList.remove('is-active'); it.btn.setAttribute('aria-pressed', 'false'); }
  }
  function clearActive() {
    if (activeIdx >= 0) deactivate(legendItems[activeIdx]);
    activeIdx = -1;
    canvas.classList.remove('zm-focus');
  }
  function selectPlace(idx, opts) {
    opts = opts || {};
    if (activeIdx >= 0 && activeIdx !== idx) deactivate(legendItems[activeIdx]);
    const it = legendItems[idx]; if (!it) return;
    activeIdx = idx;
    canvas.classList.add('zm-focus');
    const el = markerEl(it); if (el) el.classList.add('zm-pin--active');
    try { it.marker.setZIndexOffset(1000); } catch (e) {}
    if (it.btn) { it.btn.classList.add('is-active'); it.btn.setAttribute('aria-pressed', 'true'); }
    if (opts.pan !== false) { try { map.setView([it.lat, it.lng], Math.max(map.getZoom(), 15), { animate: true }); } catch (e) {} }
    if (opts.popup !== false) { try { it.marker.openPopup(); } catch (e) {} }
  }

  if (legendItems.length) {
    const legend = E('div', 'zm-legend');
    legend.appendChild(E('div', 'zm-legend-hint', '이름을 탭하면 지도에서 위치가 표시돼요'));
    legendItems.forEach((it, idx) => {
      const b = E('button', 'zm-leg-item' + (it.rec ? ' is-rec' : ''));
      b.type = 'button';
      b.setAttribute('aria-pressed', 'false');
      const badge = E('span', 'zm-leg-num', String(it.num));
      badge.style.background = it.bg;
      b.appendChild(badge);
      b.appendChild(E('span', 'zm-leg-name', it.name + (it.rec ? ' ★' : '')));
      b.addEventListener('click', () => { try { selectPlace(idx); } catch (e) {} });
      b.addEventListener('mouseenter', () => setHover(idx, true));
      b.addEventListener('mouseleave', () => setHover(idx, false));
      it.btn = b;
      legend.appendChild(b);
    });
    canvas.parentNode.insertBefore(legend, canvas.nextSibling);
  }

  // 핀 → 범례 칩 연동 (탭 시 강조, 호버 미리보기). 팝업은 Leaflet 기본 동작이 띄움.
  legendItems.forEach((it, idx) => {
    it.marker.on('click', () => {
      try { selectPlace(idx, { pan: false, popup: false }); } catch (e) {}
      if (it.btn) { it.btn.classList.add('is-flash'); setTimeout(() => { try { it.btn.classList.remove('is-flash'); } catch (e) {} }, 1200); }
    });
    it.marker.on('mouseover', () => setHover(idx, true));
    it.marker.on('mouseout', () => setHover(idx, false));
  });
  map.on('click', () => { try { clearActive(); } catch (e) {} });

  if (pts.length) map.fitBounds(L.latLngBounds(pts).pad(0.18));
  setTimeout(() => { try { map.invalidateSize(); if (pts.length) map.fitBounds(L.latLngBounds(pts).pad(0.18)); } catch (e) {} }, 120);
}

function setupZoneMaps() {
  const tryInit = (entry) => { if (window.L) initLeafletMap(entry); };
  if ('IntersectionObserver' in window) {
    const io = new IntersectionObserver((ents, obs) => {
      ents.forEach(e => {
        if (e.isIntersecting) {
          const entry = ZONE_MAP_REG.find(x => x.el === e.target);
          if (entry) { tryInit(entry); if (entry.el.dataset.init === '1') obs.unobserve(e.target); }
        }
      });
    }, { rootMargin: '250px 0px 250px 0px' });
    ZONE_MAP_REG.forEach(x => io.observe(x.el));
  }
  // Leaflet(defer) 로드 완료 후, 현재 화면에 가까운 지도들 보강 초기화
  window.addEventListener('load', () => {
    if (!window.L) return;
    ZONE_MAP_REG.forEach(entry => {
      if (entry.el.dataset.init === '1') return;
      const r = entry.el.getBoundingClientRect();
      if (r.top < window.innerHeight + 350 && r.bottom > -350) initLeafletMap(entry);
    });
  });
}

function refreshVisibleMaps() {
  ZONE_MAP_REG.forEach(e => { if (e.map && e.el.offsetParent !== null) { try { e.map.invalidateSize(); } catch (_) {} } });
}

function applyFilter() {
  let any = false;
  document.querySelectorAll('.zone').forEach(z => {
    let zVis = false;
    z.querySelectorAll('.catsec').forEach(cs => {
      const catOk = activeCat === 'all' || cs.dataset.cat === activeCat;
      let sVis = false;
      cs.querySelectorAll('.place').forEach(card => {
        const show = catOk && (!recOnly || card.dataset.rec === '1') && (!essentialOnly || card.dataset.ess === '1');
        card.classList.toggle('hide', !show);
        if (show) sVis = true;
      });
      cs.classList.toggle('hide', !sVis);
      if (sVis) zVis = true;
    });
    z.classList.toggle('hide', !zVis);
    if (zVis) any = true;
  });
  document.getElementById('empty').classList.toggle('show', !any);
  setTimeout(refreshVisibleMaps, 60);
}

/* 스크롤 시 현재 구역 칩 하이라이트
   ⚠ 칩 강조 시 절대 페이지(세로)를 스크롤하지 않음 — 가로 스크롤러만 이동.
      (이전 버그: 칩이 sticky 내비 안에 있어 scrollIntoView 가 페이지를 맨 위로 끌어올림) */
function setupScrollSpy() {
  const scroller = document.getElementById('zone-nav');
  const chips = {};
  document.querySelectorAll('.zone-chip').forEach(c => { chips[c.dataset.target] = c; });
  function centerChip(c) {
    if (!scroller) return;
    const cr = c.getBoundingClientRect(), sr = scroller.getBoundingClientRect();
    const delta = (cr.left - sr.left) - (sr.width - cr.width) / 2;
    scroller.scrollBy({ left: delta, behavior: 'smooth' });  // 가로만. 세로 스크롤 미관여
  }
  const io = new IntersectionObserver((ents) => {
    ents.forEach(e => {
      if (e.isIntersecting) {
        Object.values(chips).forEach(c => c.removeAttribute('aria-current'));
        const c = chips[e.target.id];
        if (c) { c.setAttribute('aria-current', 'true'); centerChip(c); }
      }
    });
  }, { rootMargin: '-110px 0px -65% 0px', threshold: 0 });
  document.querySelectorAll('.zone, .disney').forEach(z => io.observe(z));
}

/* 맨 위로 버튼 */
function setupToTop() {
  const btn = document.getElementById('totop');
  btn.appendChild(icon(SVG.up));
  btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  window.addEventListener('scroll', () => { btn.classList.toggle('show', window.scrollY > 600); }, { passive: true });
}

applyFilter();
setupScrollSpy();
setupToTop();

<!-- 접속 비번 게이트 로직 — 평문 비번 박제 X (SHA-256 해시만). 5회 실패 = 5분 잠금.
     ⚠ 한계: devtools 로 localStorage 조작 / 소스의 해시 우회는 기술 사용자에게 가능.
        본 게이트 = 일반 사용자·검색 엔진 차단 효과만. (메인 매거진과 동일 정책) -->
<script>
(function () {
  'use strict';
  var AUTH_HASH = '8c06fb4ce2978b46744875c757122e5e502b26b2ac518c4acc44024918301c73';  // sha256('tokyo2026')
  var AUTH_KEY = 'tokyo-guide-auth-v2';        // 비번 변경 시 v 버전 bump → 구 토큰 무효화 (v1: PII 비번 → v2: tokyo2026)
  var AUTH_LOCK_KEY = 'tokyo-guide-auth-lock';
  var AUTH_ATTEMPT_KEY = 'tokyo-guide-auth-attempts';
  var AUTH_MAX_ATTEMPTS = 5;
  var AUTH_LOCK_MS = 5 * 60 * 1000;

  async function sha256Hex(s) {
    // 한글 NFC 정규화 (macOS / iOS 가 NFD 로 입력 가능 — 자모 분리 방지)
    var normalized = (typeof s === 'string') ? s.normalize('NFC') : '';
    var buf = new TextEncoder().encode(normalized);
    var hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash)).map(function (b) { return b.toString(16).padStart(2, '0'); }).join('');
  }
  function isAuthed() { try { return localStorage.getItem(AUTH_KEY) === 'ok'; } catch (e) { return false; } }
  function markOk() {
    try {
      localStorage.setItem(AUTH_KEY, 'ok');
      localStorage.removeItem(AUTH_ATTEMPT_KEY);
      localStorage.removeItem(AUTH_LOCK_KEY);
    } catch (e) {}
    document.documentElement.classList.remove('auth-locked');
    var gate = document.getElementById('auth-gate');
    if (gate) gate.style.display = 'none';
  }

  function initAuthGate() {
    if (isAuthed()) {
      document.documentElement.classList.remove('auth-locked');
      var g = document.getElementById('auth-gate');
      if (g) g.style.display = 'none';
      return;
    }
    var input = document.getElementById('auth-input');
    var form = document.getElementById('auth-form');
    var submit = document.getElementById('auth-submit');
    var msg = document.getElementById('auth-msg');
    if (!input || !form) return;

    var lockTimer = null;
    function updateLockState() {
      var lockUntil = 0;
      try { lockUntil = parseInt(localStorage.getItem(AUTH_LOCK_KEY) || '0', 10) || 0; } catch (e) {}
      var now = Date.now();
      if (lockUntil > now) {
        var sec = Math.ceil((lockUntil - now) / 1000);
        input.disabled = true; submit.disabled = true;
        if (msg) msg.textContent = '잠금 — ' + sec + '초 후 재시도';
        if (lockTimer) clearTimeout(lockTimer);
        lockTimer = setTimeout(updateLockState, 1000);
        return true;
      }
      input.disabled = false; submit.disabled = false;
      return false;
    }

    async function tryAuth() {
      if (updateLockState()) return;
      var v = (input.value || '').trim();
      if (!v) return;
      submit.disabled = true;
      var ok = false;
      try { ok = ((await sha256Hex(v)) === AUTH_HASH); } catch (e) { ok = false; }
      if (ok) {
        if (msg) { msg.textContent = '열림.'; msg.classList.add('ok'); }
        markOk();
        setTimeout(function () { try { window.location.reload(); } catch (e) {} }, 240);
      } else {
        var attempts = 0;
        try { attempts = (parseInt(localStorage.getItem(AUTH_ATTEMPT_KEY) || '0', 10) || 0) + 1; } catch (e) { attempts = 1; }
        try { localStorage.setItem(AUTH_ATTEMPT_KEY, String(attempts)); } catch (e) {}
        input.value = ''; submit.disabled = false;
        if (attempts >= AUTH_MAX_ATTEMPTS) {
          var lockUntil = Date.now() + AUTH_LOCK_MS;
          try { localStorage.setItem(AUTH_LOCK_KEY, String(lockUntil)); localStorage.setItem(AUTH_ATTEMPT_KEY, '0'); } catch (e) {}
          if (msg) msg.textContent = AUTH_MAX_ATTEMPTS + '회 실패 — 5분 잠금';
          updateLockState();
        } else {
          if (msg) msg.textContent = '다시 (' + attempts + '/' + AUTH_MAX_ATTEMPTS + ')';
          input.focus();
        }
      }
    }

    form.addEventListener('submit', function (e) { e.preventDefault(); tryAuth(); });
    updateLockState();
    setTimeout(function () { try { input.focus(); } catch (e) {} }, 80);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initAuthGate);
  } else {
    initAuthGate();
  }
})();
</script>
</body>
